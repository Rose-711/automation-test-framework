<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>本地测试页面</title>
<style>
  body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
  h1 { color: #333; }
  section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
  label { display: inline-block; margin: 5px 10px; }
  button { padding: 8px 16px; cursor: pointer; }
  #dynamic-content { margin-top: 10px; padding: 10px; background: #f0f8ff; border-radius: 4px; min-height: 20px; }
  .hidden { display: none; }
  .result-item { padding: 8px; border-bottom: 1px solid #eee; }
  .result-item:last-child { border-bottom: none; }
</style>
</head>
<body>
  <h1>本地 UI 测试页面</h1>

  <!-- 复选框 -->
  <section id="checkbox-section">
    <h2>复选框测试</h2>
    <label><input type="checkbox" name="hobby" value="reading"> 阅读</label>
    <label><input type="checkbox" name="hobby" value="music" checked> 音乐</label>
    <label><input type="checkbox" name="hobby" value="sports"> 运动</label>
    <label><input type="checkbox" name="hobby" value="travel" checked> 旅行</label>
    <button id="check-all" onclick="document.querySelectorAll('[name=hobby]').forEach(c => c.checked = true)">全选</button>
    <button id="uncheck-all" onclick="document.querySelectorAll('[name=hobby]').forEach(c => c.checked = false)">取消全选</button>
    <p id="checkbox-count">已选: <span id="checked-count">2</span></p>
  </section>

  <!-- 下拉菜单 -->
  <section id="dropdown-section">
    <h2>下拉菜单测试</h2>
    <select id="city-select">
      <option value="">请选择城市</option>
      <option value="beijing">北京</option>
      <option value="shanghai">上海</option>
      <option value="guangzhou">广州</option>
      <option value="shenzhen">深圳</option>
    </select>
    <p>已选: <span id="selected-city">未选择</span></p>
  </section>

  <!-- 表单输入 -->
  <section id="form-section">
    <h2>表单测试</h2>
    <form id="test-form">
      <label>用户名: <input type="text" id="username" name="username" placeholder="请输入用户名"></label><br><br>
      <label>邮箱: <input type="email" id="email" name="email" placeholder="请输入邮箱"></label><br><br>
      <label>密码: <input type="password" id="password" name="password"></label><br><br>
      <label>确认密码: <input type="password" id="confirm-password" name="confirm_password"></label><br><br>
      <button type="submit">提交</button>
      <button type="reset">重置</button>
    </form>
    <p id="form-result"></p>
  </section>

  <!-- 动态加载 -->
  <section id="dynamic-section">
    <h2>动态内容测试</h2>
    <button id="load-content" onclick="loadDynamicContent()">加载内容</button>
    <div id="dynamic-content" class="hidden"></div>
  </section>

  <!-- 搜索框 -->
  <section id="search-section">
    <h2>搜索测试</h2>
    <input type="text" id="search-input" placeholder="输入关键字搜索">
    <button id="search-btn">搜索</button>
    <div id="search-results"></div>
  </section>

  <script>
    // 复选框计数
    document.querySelectorAll('[name=hobby]').forEach(cb => {
      cb.addEventListener('change', updateCheckboxCount);
    });
    function updateCheckboxCount() {
      const count = document.querySelectorAll('[name=hobby]:checked').length;
      document.getElementById('checked-count').textContent = count;
    }

    // 下拉菜单
    document.getElementById('city-select').addEventListener('change', function() {
      const text = this.options[this.selectedIndex]?.text || '未选择';
      document.getElementById('selected-city').textContent = text;
    });

    // 表单提交
    document.getElementById('test-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const pwd = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;
      if (!username) { document.getElementById('form-result').textContent = '请输入用户名'; return; }
      if (pwd !== confirm) { document.getElementById('form-result').textContent = '两次密码不一致'; return; }
      document.getElementById('form-result').textContent = '提交成功！';
    });

    // 动态加载
    function loadDynamicContent() {
      document.getElementById('dynamic-content').classList.remove('hidden');
      document.getElementById('dynamic-content').textContent = '⏳ 加载中...';
      setTimeout(() => {
        document.getElementById('dynamic-content').innerHTML = '✅ 动态内容加载完成！当前时间: ' + new Date().toLocaleString();
      }, 1500);
    }

    // 搜索
    document.getElementById('search-btn').addEventListener('click', function() {
      const keyword = document.getElementById('search-input').value.trim();
      const resultsDiv = document.getElementById('search-results');
      if (!keyword) { resultsDiv.innerHTML = '<p style="color:red">请输入搜索关键字</p>'; return; }
      const data = [
        'Python 自动化测试框架', 'Playwright 浏览器自动化', 'Pytest 测试框架',
        'Allure 测试报告', 'Selenium vs Playwright'
      ];
      const filtered = data.filter(item => item.includes(keyword));
      if (filtered.length === 0) {
        resultsDiv.innerHTML = '<p>未找到结果</p>';
      } else {
        resultsDiv.innerHTML = filtered.map(item => `<div class="result-item">🔍 ${item}</div>`).join('');
      }
    });
  </script>
</body>
</html>
